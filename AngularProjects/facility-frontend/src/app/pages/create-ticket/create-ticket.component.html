<div class="ticket-page">
  <div class="ticket-card">
    <div class="header-row">
      <h2>Create Ticket</h2>
      <a routerLink="/my-ticket" class="back-link">← Back</a>
    </div>

    <form (ngSubmit)="submit()" class="ticket-form">
      <div class="form-group">
        <label>Title *</label>
        <input
          type="text"
          name="title"
          [(ngModel)]="formData.title"
          maxlength="200"
          placeholder="Short issue title"
          required
        />
      </div>

      <div class="form-group">
        <label>Description *</label>
        <textarea
          name="description"
          [(ngModel)]="formData.description"
          rows="4"
          maxlength="1000"
          placeholder="Describe the issue details"
          required
        ></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Location *</label>
          <input
            type="text"
            name="location"
            [(ngModel)]="formData.location"
            maxlength="100"
            placeholder="Building/Floor/Room"
            required
          />
        </div>

        <div class="form-group">
          <label>Category *</label>
          <select name="categoryId" [(ngModel)]="formData.categoryId" required>
            <option [ngValue]="0">Select category</option>
            <option *ngFor="let item of categories" [ngValue]="item.categoryId">
              {{ item.categoryName }}
            </option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Priority</label>
          <select name="priority" [(ngModel)]="formData.priority">
            <option [ngValue]="1">Low</option>
            <option [ngValue]="2">Medium</option>
            <option [ngValue]="3">High</option>
          </select>
        </div>

        <div class="form-group">
          <label>Image (optional, max 2MB)</label>
          <input #imageInput type="file" accept="image/*" class="file-input-hidden" (change)="onImageSelected($event)" />
          <div class="file-picker-row">
            <button type="button" class="btn-file" (click)="imageInput.click()">Choose image</button>
            <span class="file-name" [title]="selectedImageName || 'No file selected'">
              {{ selectedImageName || 'No file selected' }}
            </span>
          </div>
          <img *ngIf="formData.imageBefore" [src]="formData.imageBefore" alt="Preview" class="image-preview" />
          <button *ngIf="formData.imageBefore" type="button" class="btn-remove" (click)="clearImage(imageInput)">Remove image</button>
        </div>
      </div>

      <div class="action-row">
        <a routerLink="/my-ticket" class="btn-back">Back</a>
        <button type="submit" [disabled]="loading">
          {{ loading ? 'Creating...' : 'Create Ticket' }}
        </button>
      </div>
    </form>
  </div>

  <div class="popup-overlay" *ngIf="popupVisible">
    <div class="popup-card" [class.success]="popupType === 'success'" [class.error]="popupType === 'error'" [class.warning]="popupType === 'warning'">
      <h3>{{ popupTitle }}</h3>
      <p>{{ popupMessage }}</p>
      <div class="popup-actions">
        <button type="button" class="popup-ok" (click)="closePopup()">OK</button>
      </div>
    </div>
  </div>
</div>
