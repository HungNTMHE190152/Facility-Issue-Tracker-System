<div class="login-wrapper">
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-circle">
                    <svg xmlns="http://www.w3.org/2000/svg" class="logo-icon" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
                <h2 class="title" *ngIf="step === 1">Forgot Password</h2>
                <h2 class="title" *ngIf="step === 2">Reset Password</h2>
                <p class="subtitle">
                    Remember your password? <a routerLink="/login" class="link">Login here</a>
                </p>
            </div>

            <div *ngIf="message" class="alert" [ngClass]="{'alert-error': isError, 'alert-success': !isError}">
                {{ message }}
            </div>

            <!-- STEP 1: Email Form -->
            <form *ngIf="step === 1" class="login-form" (ngSubmit)="requestOtp()">
                <div class="input-group">
                    <label for="email" class="input-label">Email Address</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"
                            fill="currentColor">
                            <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z" />
                            <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z" />
                        </svg>
                        <input id="email" name="email" type="email" required [(ngModel)]="email" class="form-input"
                            placeholder="Enter your registered email" [disabled]="isLoading">
                    </div>
                </div>

                <button type="submit" class="submit-btn" [class.btn-active]="email && !isLoading"
                    [disabled]="isLoading">
                    {{ isLoading ? 'Sending...' : 'Send OTP' }}
                    <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" *ngIf="!isLoading">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M14 5l7 7m0 0l-7 7m7-7H3" />
                    </svg>
                </button>
            </form>

            <!-- STEP 2: Reset Form -->
            <form *ngIf="step === 2" class="login-form" (ngSubmit)="resetPassword()">
                <div class="input-group">
                    <label for="otp" class="input-label">OTP Code</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 24"
                            fill="currentColor">
                            <path fill-rule="evenodd"
                                d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                                clip-rule="evenodd" />
                        </svg>
                        <input id="otp" name="otp" type="text" required [(ngModel)]="otp" class="form-input"
                            placeholder="Enter 6-digit OTP" [disabled]="isLoading">
                    </div>
                </div>

                <div class="input-group">
                    <label for="newPassword" class="input-label">New Password</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"
                            fill="currentColor">
                            <path fill-rule="evenodd"
                                d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"
                                clip-rule="evenodd" />
                        </svg>
                        <input id="newPassword" name="newPassword" type="password" required [(ngModel)]="newPassword"
                            class="form-input" placeholder="Enter new password" [disabled]="isLoading">
                    </div>
                </div>

                <div class="input-group">
                    <label for="confirmPassword" class="input-label">Confirm Password</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"
                            fill="currentColor">
                            <path fill-rule="evenodd"
                                d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"
                                clip-rule="evenodd" />
                        </svg>
                        <input id="confirmPassword" name="confirmPassword" type="password" required
                            [(ngModel)]="confirmPassword" class="form-input" placeholder="Confirm new password"
                            [disabled]="isLoading">
                    </div>
                </div>

                <button type="submit" class="submit-btn"
                    [class.btn-active]="otp && newPassword && confirmPassword && !isLoading" [disabled]="isLoading">
                    {{ isLoading ? 'Processing...' : 'Reset Password' }}
                    <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" *ngIf="!isLoading">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M14 5l7 7m0 0l-7 7m7-7H3" />
                    </svg>
                </button>
            </form>
        </div>
    </div>
</div>
