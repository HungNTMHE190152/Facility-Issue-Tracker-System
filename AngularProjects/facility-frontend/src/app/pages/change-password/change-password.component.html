<div class="change-password-wrapper">
  <!-- Dynamic Background Effects -->
  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>
  <div class="bg-shape shape-3"></div>

  <div class="content-container">

    <!-- Main Card -->
    <div class="password-card">
      <div class="card-header">
        <div class="header-left">
          <a routerLink="/profile" class="btn-back" title="Back to Profile">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" />
            </svg>
          </a>
          <div class="header-text">
            <h2 class="title">Secure Your Account</h2>
            <p class="subtitle">Enter your current password to set a new one</p>
          </div>
        </div>
      </div>

      <!-- Error / Success Message -->
      <div *ngIf="errorMessage" class="error-message"
        style="color: #dc2626; margin: 1rem 0; text-align: center; font-weight: 500;">
        {{ errorMessage }}
      </div>
      <div *ngIf="successMessage" class="success-message"
        style="color: #10b981; margin: 1rem 0; text-align: center; font-weight: 500;">
        {{ successMessage }}
      </div>

      <form (ngSubmit)="onSubmit()" class="password-form">
        <!-- Current Password -->
        <div class="input-group">
          <label for="currentPassword" class="input-label">Current Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd"
                d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"
                clip-rule="evenodd" />
            </svg>
            <input id="currentPassword" type="password" required [(ngModel)]="currentPassword" name="currentPassword"
              class="form-input" placeholder="Enter current password">
          </div>
        </div>

        <!-- New Password -->
        <div class="input-group">
          <label for="newPassword" class="input-label">New Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd"
                d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"
                clip-rule="evenodd" />
            </svg>
            <input id="newPassword" type="password" required [(ngModel)]="newPassword" name="newPassword"
              class="form-input" placeholder="Enter new password">
          </div>
        </div>

        <!-- Confirm New Password -->
        <div class="input-group">
          <label for="confirmNewPassword" class="input-label">Confirm New Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd"
                d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                clip-rule="evenodd" />
            </svg>
            <input id="confirmNewPassword" type="password" required [(ngModel)]="confirmNewPassword"
              name="confirmNewPassword" class="form-input" placeholder="Confirm new password">
          </div>
        </div>

        <div class="action-row">
          <button type="button" routerLink="/profile" class="cancel-btn">Cancel</button>
          <button type="submit" class="submit-btn"
            [class.btn-active]="currentPassword.trim() && newPassword.trim() && confirmNewPassword.trim() && !isLoading"
            [disabled]="isLoading || !currentPassword.trim() || !newPassword.trim() || !confirmNewPassword.trim()">
            <span *ngIf="!isLoading">Update Password</span>
            <span *ngIf="isLoading">Updating...</span>
            <svg *ngIf="!isLoading" class="btn-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
            </svg>
          </button>
        </div>
      </form>
    </div>

  </div>
</div>
